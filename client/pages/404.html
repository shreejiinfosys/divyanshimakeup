<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Divyanshi Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23050505'/%3E%3Ctext x='32' y='43' font-family='Georgia,serif' font-size='34' fill='%23D4AF37' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #050505;
            color: #f8f8f8;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .wrap { max-width: 480px; }
        .numeral {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 300;
            line-height: 1;
            color: #D4AF37;
            opacity: 0.22;
            letter-spacing: 0.06em;
        }
        .divider {
            width: 36px;
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            margin: 20px auto 22px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 300;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }
        .sub {
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 36px;
            line-height: 1.8;
        }
        .btn {
            display: inline-block;
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #D4AF37;
            text-decoration: none;
            border: 1px solid rgba(212,175,55,0.3);
            padding: 11px 28px;
            transition: border-color 0.3s, color 0.3s;
        }
        .btn:hover {
            border-color: #D4AF37;
            color: #f8f8f8;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            color: #333;
            text-transform: uppercase;
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <span class="logo">Divyanshi</span>
    <div class="wrap">
        <div class="numeral">404</div>
        <div class="divider"></div>
        <h1>Page Not Found</h1>
        <p class="sub">The page you're looking for may have moved<br>or no longer exists.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>
</html>
